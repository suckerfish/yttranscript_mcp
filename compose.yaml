services:
  yttranscript-mcp:
    image: ghcr.io/suckerfish/yttranscript_mcp:latest
    container_name: yttranscript-mcp
    environment:
      - YT_TRANSCRIPT_SERVER_HOST=0.0.0.0
      - YT_TRANSCRIPT_SERVER_PORT=8080
      - YT_TRANSCRIPT_DEBUG=${DEBUG:-false}
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${PORT:-8081}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
